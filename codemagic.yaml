# Репозиторий = корень app/ (savdo) — github.com/alert3002/savdo
# Codemagic → Settings → Use codemagic.yaml → workflow: grass-ios
#
# Имзо: Codemagic → Teams → Integrations → App Store Connect (API key)
#       ё Certificates / Provisioning profiles барои com.grass.grass.app
workflows:
  grass-ios:
    name: Grass iOS
    max_build_duration: 90
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      # Пас аз илова кардани App Store Connect дар Codemagic, инро кушоед:
      # ios_signing:
      #   distribution_type: app_store
      #   bundle_identifier: com.grass.grass.app
    # integrations:
    #   app_store_connect: <номи API key дар Codemagic>
    scripts:
      - name: Build iOS IPA (custom)
        script: |
          chmod +x scripts/codemagic_build_ios.sh
          ./scripts/codemagic_build_ios.sh
    artifacts:
      - build/ios/ipa/*.ipa

  grass-android:
    name: Grass Android
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Android AAB
        script: |
          set -e
          flutter pub get
          flutter build appbundle --release
    artifacts:
      - build/**/outputs/**/*.aab
